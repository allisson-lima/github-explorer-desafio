name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Prettier, Testes e Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Verificar lint
        run: npm run lint

      - name: Verificar formatação (Prettier)
        run: npm run prettier:check

      - name: Rodar testes
        run: npm run test:run

      - name: Rodar build
        run: npm run build
